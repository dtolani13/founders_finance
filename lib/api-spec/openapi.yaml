openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Founders Finance API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
  - name: auth
  - name: entities
  - name: accounts
  - name: categories
  - name: vendors
  - name: transactions
  - name: expenses
  - name: allocation-presets
  - name: intercompany
  - name: owner-contributions
  - name: owner-draws
  - name: reimbursements
  - name: dashboard
  - name: tax-reserve
  - name: documents
  - name: statements
  - name: monthly-close
  - name: exports
  - name: backups
  - name: audit

security:
  - sessionCookie: []

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      security: []
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/status:
    get:
      operationId: getAuthStatus
      tags: [auth]
      summary: Get owner-access configuration and session status
      security: []
      responses:
        "200":
          description: Current authentication status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthStatus"

  /auth/setup:
    post:
      operationId: setupOwnerAccess
      tags: [auth]
      summary: Configure the single owner passphrase and start a session
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthCredentials"
      responses:
        "201":
          description: Owner access configured and authenticated
          headers:
            Set-Cookie:
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthenticatedSession"
        "409":
          description: Owner access is already configured

  /auth/login:
    post:
      operationId: loginOwner
      tags: [auth]
      summary: Unlock Founders Finance
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthCredentials"
      responses:
        "200":
          description: Authenticated owner session
          headers:
            Set-Cookie:
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthenticatedSession"
        "401":
          description: Invalid passphrase
        "429":
          description: Temporarily locked after repeated failures

  /auth/logout:
    post:
      operationId: logoutOwner
      tags: [auth]
      summary: End the current owner session
      security: []
      responses:
        "204":
          description: Session ended

  /entities:
    get:
      operationId: listEntities
      tags: [entities]
      summary: List all entities
      parameters:
        - name: include_inactive
          in: query
          required: false
          schema:
            type: boolean
      responses:
        "200":
          description: List of entities
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Entity"
    post:
      operationId: createEntity
      tags: [entities]
      summary: Create an entity with default checking and tax reserve accounts
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateEntityBody"
      responses:
        "201":
          description: Created entity
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Entity"

  /entities/{id}:
    get:
      operationId: getEntity
      tags: [entities]
      summary: Get entity by id
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Entity
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Entity"
        "404":
          description: Not found
    put:
      operationId: updateEntity
      tags: [entities]
      summary: Update entity
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateEntityBody"
      responses:
        "200":
          description: Updated entity
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Entity"

  /entities/{id}/close:
    post:
      operationId: closeEntity
      tags: [entities]
      summary: Close entity and preserve records
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EntityLifecycleBody"
      responses:
        "200":
          description: Closed entity
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Entity"

  /entities/{id}/closure-assessment:
    get:
      operationId: getEntityClosureAssessment
      tags: [entities]
      summary: Inspect balances and unresolved records before closing a company
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Company closure warnings and counts
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EntityClosureAssessment"

  /entities/{id}/archive:
    post:
      operationId: archiveEntity
      tags: [entities]
      summary: Archive entity for recordkeeping
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EntityLifecycleBody"
      responses:
        "200":
          description: Archived entity
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Entity"

  /entities/{id}/reopen:
    post:
      operationId: reopenEntity
      tags: [entities]
      summary: Reopen entity
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Reopened entity
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Entity"

  /accounts:
    get:
      operationId: listAccounts
      tags: [accounts]
      summary: List accounts
      parameters:
        - name: entity_id
          in: query
          required: false
          schema:
            type: string
            format: uuid
        - name: include_inactive
          in: query
          required: false
          schema:
            type: boolean
      responses:
        "200":
          description: List of accounts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Account"
    post:
      operationId: createAccount
      tags: [accounts]
      summary: Create a company account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAccountBody"
      responses:
        "201":
          description: Created account
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Account"

  /accounts/{id}:
    get:
      operationId: getAccount
      tags: [accounts]
      summary: Get account by id
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Account
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Account"
    put:
      operationId: updateAccount
      tags: [accounts]
      summary: Edit, deactivate, or reactivate an account
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateAccountBody"
      responses:
        "200":
          description: Updated account
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Account"

  /categories:
    get:
      operationId: listCategories
      tags: [categories]
      summary: List categories
      parameters:
        - name: include_inactive
          in: query
          required: false
          schema:
            type: boolean
      responses:
        "200":
          description: List of categories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Category"
    post:
      operationId: createCategory
      tags: [categories]
      summary: Create a category
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCategoryBody"
      responses:
        "201":
          description: Created category
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"

  /categories/{id}:
    put:
      operationId: updateCategory
      tags: [categories]
      summary: Edit, deactivate, or reactivate a category
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCategoryBody"
      responses:
        "200":
          description: Updated category
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"

  /vendors:
    get:
      operationId: listVendors
      tags: [vendors]
      summary: List vendors
      parameters:
        - name: include_inactive
          in: query
          required: false
          schema:
            type: boolean
      responses:
        "200":
          description: List of vendors
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Vendor"
    post:
      operationId: createVendor
      tags: [vendors]
      summary: Create vendor
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateVendorBody"
      responses:
        "201":
          description: Created vendor
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Vendor"

  /vendors/{id}:
    put:
      operationId: updateVendor
      tags: [vendors]
      summary: Edit, deactivate, or reactivate a vendor
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateVendorBody"
      responses:
        "200":
          description: Updated vendor
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Vendor"

  /transactions:
    get:
      operationId: listTransactions
      tags: [transactions]
      summary: List transactions
      parameters:
        - name: entity_id
          in: query
          required: false
          schema:
            type: string
            format: uuid
        - name: transaction_type
          in: query
          required: false
          schema:
            type: string
        - name: status
          in: query
          required: false
          schema:
            type: string
        - name: date_from
          in: query
          required: false
          schema:
            type: string
            format: date
        - name: date_to
          in: query
          required: false
          schema:
            type: string
            format: date
      responses:
        "200":
          description: List of transactions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Transaction"
    post:
      operationId: createTransaction
      tags: [transactions]
      summary: Create transaction
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTransactionBody"
      responses:
        "201":
          description: Created transaction
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Transaction"

  /transactions/{id}:
    get:
      operationId: getTransaction
      tags: [transactions]
      summary: Get transaction by id
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Transaction with lines and allocations
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TransactionDetail"
        "404":
          description: Not found
    put:
      operationId: updateTransaction
      tags: [transactions]
      summary: Update transaction
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTransactionBody"
      responses:
        "200":
          description: Updated transaction
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Transaction"

  /transactions/{id}/lines:
    post:
      operationId: addTransactionLines
      tags: [transactions]
      summary: Add lines to transaction
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddTransactionLinesBody"
      responses:
        "200":
          description: Transaction detail with lines
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TransactionDetail"

  /transactions/{id}/balance-check:
    post:
      operationId: checkTransactionBalance
      tags: [transactions]
      summary: Check if transaction is balanced
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Balance check result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BalanceCheckResult"

  /transactions/{id}/post:
    post:
      operationId: postTransaction
      tags: [transactions]
      summary: Post a transaction (change status to posted)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Posted transaction
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Transaction"

  /transactions/{id}/void:
    post:
      operationId: voidTransaction
      tags: [transactions]
      summary: Void a transaction while retaining its financial history
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Voided transaction
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Transaction"

  /expenses/manual:
    post:
      operationId: createManualExpense
      tags: [expenses]
      summary: Create manual expense with allocations
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateManualExpenseBody"
      responses:
        "201":
          description: Created expense
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TransactionDetail"

  /expenses/unallocated:
    get:
      operationId: listUnallocatedExpenses
      tags: [expenses]
      summary: List expenses without complete allocations
      responses:
        "200":
          description: List of unallocated transactions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Transaction"

  /expenses/{transactionId}/allocations:
    post:
      operationId: createExpenseAllocations
      tags: [expenses]
      summary: Set allocations for an expense
      parameters:
        - name: transactionId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAllocationsBody"
      responses:
        "200":
          description: Allocations created
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ExpenseAllocation"

  /allocation-presets:
    get:
      operationId: listAllocationPresets
      tags: [allocation-presets]
      summary: List allocation presets
      parameters:
        - name: include_inactive
          in: query
          required: false
          schema:
            type: boolean
      responses:
        "200":
          description: List of allocation presets with lines
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AllocationPreset"
    post:
      operationId: createAllocationPreset
      tags: [allocation-presets]
      summary: Create an allocation preset
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAllocationPresetBody"
      responses:
        "201":
          description: Created allocation preset
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AllocationPreset"

  /allocation-presets/{id}:
    get:
      operationId: getAllocationPreset
      tags: [allocation-presets]
      summary: Get allocation preset by id
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Allocation preset with lines
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AllocationPreset"
    put:
      operationId: updateAllocationPreset
      tags: [allocation-presets]
      summary: Edit, deactivate, or reactivate an allocation preset
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateAllocationPresetBody"
      responses:
        "200":
          description: Updated allocation preset
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AllocationPreset"

  /intercompany/balances:
    get:
      operationId: listIntercompanyBalances
      tags: [intercompany]
      summary: List intercompany balances
      responses:
        "200":
          description: List of intercompany links with balances
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/IntercompanyLink"

  /intercompany/{id}/mark-paid:
    post:
      operationId: markIntercompanyPaid
      tags: [intercompany]
      summary: Mark intercompany balance as paid
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MarkPaidBody"
      responses:
        "200":
          description: Updated intercompany link
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IntercompanyLink"

  /owner-contributions:
    get:
      operationId: listOwnerContributions
      tags: [owner-contributions]
      summary: List owner contributions
      responses:
        "200":
          description: List of owner contributions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/OwnerContribution"
    post:
      operationId: createOwnerContribution
      tags: [owner-contributions]
      summary: Record owner contribution
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateOwnerContributionBody"
      responses:
        "201":
          description: Created owner contribution
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OwnerContribution"

  /owner-draws:
    get:
      operationId: listOwnerDraws
      tags: [owner-draws]
      summary: List owner draws
      responses:
        "200":
          description: List of owner draws
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/OwnerDraw"
    post:
      operationId: createOwnerDraw
      tags: [owner-draws]
      summary: Record an owner draw and its balanced journal
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateOwnerDrawBody"
      responses:
        "201":
          description: Created owner draw
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OwnerDraw"

  /reimbursements:
    get:
      operationId: listReimbursements
      tags: [reimbursements]
      summary: List reimbursement requests
      responses:
        "200":
          description: List of reimbursement requests
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ReimbursementRequest"

  /reimbursements/{id}/mark-paid:
    post:
      operationId: markReimbursementPaid
      tags: [reimbursements]
      summary: Mark reimbursement as paid
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MarkPaidBody"
      responses:
        "200":
          description: Updated reimbursement request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReimbursementRequest"

  /reimbursements/{id}/waive:
    post:
      operationId: waiveReimbursement
      tags: [reimbursements]
      summary: Waive reimbursement with a balanced write-off
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReimbursementResolutionBody"
      responses:
        "200":
          description: Waived reimbursement
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReimbursementRequest"

  /reimbursements/{id}/convert-to-contribution:
    post:
      operationId: convertReimbursementToContribution
      tags: [reimbursements]
      summary: Convert a Personal-funded reimbursement into owner capital
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReimbursementResolutionBody"
      responses:
        "200":
          description: Converted reimbursement
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReimbursementRequest"

  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      summary: Get dashboard summary for all entities
      responses:
        "200":
          description: Dashboard summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  /tax-reserve/summary:
    get:
      operationId: getTaxReserveSummary
      tags: [tax-reserve]
      summary: Get tax reserve summary per entity
      responses:
        "200":
          description: Tax reserve summary
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TaxReserveSummary"

  /tax-reserve/rules:
    post:
      operationId: createTaxReserveRule
      tags: [tax-reserve]
      summary: Create or update tax reserve rule
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTaxReserveRuleBody"
      responses:
        "201":
          description: Created tax reserve rule
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaxReserveRule"

  /tax-reserve/suggest-transfer:
    post:
      operationId: suggestTaxReserveTransfer
      tags: [tax-reserve]
      summary: Calculate suggested tax reserve transfer amount
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SuggestTaxTransferBody"
      responses:
        "200":
          description: Suggested transfer amount
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaxTransferSuggestion"

  /documents:
    get:
      operationId: listDocuments
      tags: [documents]
      summary: List documents
      parameters:
        - name: entity_id
          in: query
          required: false
          schema:
            type: string
            format: uuid
        - name: transaction_id
          in: query
          required: false
          schema:
            type: string
            format: uuid
        - name: document_type
          in: query
          required: false
          schema:
            type: string
        - name: period_month
          in: query
          required: false
          schema:
            type: string
            format: date
        - name: evidence_status
          in: query
          required: false
          schema:
            type: string
        - name: include_archived
          in: query
          required: false
          schema:
            type: boolean
      responses:
        "200":
          description: List of documents
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Document"
    post:
      operationId: createDocument
      tags: [documents]
      summary: Create document metadata
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDocumentBody"
      responses:
        "201":
          description: Created document
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Document"

  /documents/{id}:
    put:
      operationId: updateDocument
      tags: [documents]
      summary: Update document metadata
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateDocumentBody"
      responses:
        "200":
          description: Updated document
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Document"
    delete:
      operationId: archiveDocument
      tags: [documents]
      summary: Archive document metadata and retain its file
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Archived document
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ArchiveDocumentResponse"

  /documents/upload:
    post:
      operationId: uploadEvidence
      tags: [documents]
      summary: Upload an evidence file and create its metadata
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/UploadEvidenceBody"
      responses:
        "201":
          description: Uploaded evidence
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Document"

  /documents/{id}/file:
    post:
      operationId: replaceEvidenceFile
      tags: [documents]
      summary: Replace an evidence file while retaining the previous bytes
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
              required: [file]
      responses:
        "200":
          description: Evidence with replacement file
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Document"

  /documents/{id}/content:
    get:
      operationId: getEvidenceContent
      tags: [documents]
      summary: Preview or download an evidence file
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: download
          in: query
          required: false
          schema:
            type: boolean
      responses:
        "200":
          description: Evidence file bytes
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary

  /statements:
    get:
      operationId: listStatements
      tags: [statements]
      summary: List statements
      parameters:
        - name: account_id
          in: query
          required: false
          schema:
            type: string
            format: uuid
        - name: include_archived
          in: query
          required: false
          schema:
            type: boolean
          description: Include archived statements in the history view.
      responses:
        "200":
          description: List of statements
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Statement"
    post:
      operationId: createStatement
      tags: [statements]
      summary: Create statement metadata
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateStatementBody"
      responses:
        "201":
          description: Created statement
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Statement"

  /statements/{id}:
    get:
      operationId: getStatement
      tags: [statements]
      summary: Get statement with lines
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Statement detail with lines
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatementDetail"
        "404":
          description: Not found
    delete:
      operationId: archiveStatement
      tags: [statements]
      summary: Archive statement while retaining lines and reconciliation history
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Archived
          content:
            application/json:
              schema:
                type: object
                properties:
                  archived:
                    type: boolean
                  id:
                    type: string
                    format: uuid
                  archived_at:
                    type: string
                    format: date-time
                required:
                  - archived
                  - id
                  - archived_at

  /statements/{id}/lines:
    get:
      operationId: listStatementLines
      tags: [statements]
      summary: List lines for a statement
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: List of statement lines
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/StatementLine"
    post:
      operationId: addStatementLines
      tags: [statements]
      summary: Add lines to statement
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddStatementLinesBody"
      responses:
        "200":
          description: Updated statement with lines
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatementDetail"

  /statement-lines/{id}/match:
    post:
      operationId: matchStatementLine
      tags: [statements]
      summary: Match statement line to transaction
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MatchStatementLineBody"
      responses:
        "200":
          description: Updated statement line
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatementLine"

  /statement-lines/{id}:
    put:
      operationId: updateStatementLine
      tags: [statements]
      summary: Update statement line status or notes
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateStatementLineBody"
      responses:
        "200":
          description: Updated statement line
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatementLine"

  /monthly-close:
    get:
      operationId: listMonthlyClosePeriods
      tags: [monthly-close]
      summary: List monthly close periods
      parameters:
        - name: entity_id
          in: query
          required: false
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: List of monthly close periods
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MonthlyClosePeriod"
    post:
      operationId: createMonthlyClosePeriod
      tags: [monthly-close]
      summary: Create monthly close period
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateMonthlyClosePeriodBody"
      responses:
        "201":
          description: Created monthly close period
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MonthlyClosePeriod"

  /monthly-close/{id}:
    put:
      operationId: updateMonthlyClosePeriod
      tags: [monthly-close]
      summary: Update monthly close period status
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateMonthlyClosePeriodBody"
      responses:
        "200":
          description: Updated monthly close period
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MonthlyClosePeriod"

  /exports/{type}:
    get:
      operationId: getExport
      tags: [exports]
      summary: Export data
      parameters:
        - name: type
          in: path
          required: true
          schema:
            type: string
            enum:
              - all_transactions
              - expenses_by_entity
              - expenses_by_category
              - owner_contributions
              - owner_draws
              - company_retention
              - reimbursements
              - intercompany_balances
              - tax_reserve_activity
              - document_index
              - personal_non_deductible
              - monthly_close_summary
              - statement_reconciliation_summary
        - name: entity_id
          in: query
          required: false
          schema:
            type: string
            format: uuid
        - name: period_month
          in: query
          required: false
          schema:
            type: string
            format: date
      responses:
        "200":
          description: Export data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExportResult"

  /audit:
    get:
      operationId: listAuditRecords
      tags: [audit]
      summary: List immutable audit records
      parameters:
        - name: table_name
          in: query
          required: false
          schema:
            type: string
        - name: action
          in: query
          required: false
          schema:
            type: string
        - name: record_id
          in: query
          required: false
          schema:
            type: string
            format: uuid
        - name: from
          in: query
          required: false
          schema:
            type: string
            format: date-time
        - name: to
          in: query
          required: false
          schema:
            type: string
            format: date-time
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 500
            default: 200
      responses:
        "200":
          description: Newest audit records first
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AuditRecord"

  /backups:
    get:
      operationId: getBackupOverview
      tags: [backups]
      summary: Get encrypted backup status and history
      responses:
        "200":
          description: Backup control-center status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BackupOverview"
    post:
      operationId: createEncryptedBackup
      tags: [backups]
      summary: Create an encrypted database and evidence backup
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBackupBody"
      responses:
        "201":
          description: Encrypted backup created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BackupMetadata"
        "409":
          description: Another backup operation is running

  /backups/{id}/verify:
    post:
      operationId: verifyEncryptedBackup
      tags: [backups]
      summary: Decrypt and verify every backup payload fingerprint
      parameters:
        - $ref: "#/components/parameters/BackupId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BackupPassphraseBody"
      responses:
        "200":
          description: Backup integrity verified
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BackupVerificationResult"

  /backups/{id}/recovery-drill:
    post:
      operationId: runBackupRecoveryDrill
      tags: [backups]
      summary: Restore a backup into an isolated database and compare row counts
      parameters:
        - $ref: "#/components/parameters/BackupId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BackupPassphraseBody"
      responses:
        "200":
          description: Recovery drill completed successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecoveryDrillResult"

  /backups/{id}/restore:
    post:
      operationId: restoreEncryptedBackup
      tags: [backups]
      summary: Create a pre-restore backup and restore the selected package
      parameters:
        - $ref: "#/components/parameters/BackupId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RestoreBackupBody"
      responses:
        "200":
          description: Backup restored and post-restore row counts matched
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RestoreBackupResult"

  /backups/{id}/download:
    get:
      operationId: downloadEncryptedBackup
      tags: [backups]
      summary: Download an encrypted backup package
      parameters:
        - $ref: "#/components/parameters/BackupId"
      responses:
        "200":
          description: Encrypted Founders Finance backup
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary

components:
  securitySchemes:
    sessionCookie:
      type: apiKey
      in: cookie
      name: ff_session
  parameters:
    BackupId:
      name: id
      in: path
      required: true
      schema:
        type: string
      description: Backup identifier
  schemas:
    AuditRecord:
      type: object
      properties:
        id:
          type: string
          format: uuid
        table_name:
          type: string
        record_id:
          type: string
          format: uuid
          nullable: true
        action:
          type: string
        previous_value:
          type: string
          nullable: true
        new_value:
          type: string
          nullable: true
        memo:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
      required:
        - id
        - table_name
        - action
        - created_at

    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    AuthStatus:
      type: object
      properties:
        configured:
          type: boolean
        authenticated:
          type: boolean
        expires_at:
          type: string
          format: date-time
          nullable: true
      required:
        - configured
        - authenticated
        - expires_at

    AuthCredentials:
      type: object
      properties:
        password:
          type: string
          minLength: 12
          maxLength: 128
          writeOnly: true
      required:
        - password

    AuthenticatedSession:
      type: object
      properties:
        authenticated:
          type: boolean
        expires_at:
          type: string
          format: date-time
      required:
        - authenticated
        - expires_at

    Entity:
      type: object
      properties:
        id:
          type: string
          format: uuid
        legal_name:
          type: string
        display_name:
          type: string
        short_code:
          type: string
        entity_type:
          type: string
        purpose:
          type: string
          nullable: true
        tax_classification_note:
          type: string
          nullable: true
        primary_color:
          type: string
          nullable: true
        secondary_color:
          type: string
          nullable: true
        accent_color:
          type: string
          nullable: true
        logo_path:
          type: string
          nullable: true
        lifecycle_status:
          type: string
          enum: [active, closed, archived]
        closed_at:
          type: string
          format: date-time
          nullable: true
        archive_until:
          type: string
          format: date-time
          nullable: true
        archive_reason:
          type: string
          nullable: true
        is_active:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
      required:
        - id
        - legal_name
        - display_name
        - short_code
        - entity_type
        - lifecycle_status
        - is_active
        - created_at
        - updated_at

    EntityLifecycleBody:
      type: object
      properties:
        archive_until:
          type: string
          format: date-time
          nullable: true
        archive_reason:
          type: string
          nullable: true

    CreateEntityBody:
      type: object
      properties:
        legal_name:
          type: string
          minLength: 1
        display_name:
          type: string
          minLength: 1
        short_code:
          type: string
          minLength: 2
          maxLength: 12
        entity_type:
          type: string
          default: LLC
        purpose:
          type: string
          nullable: true
        tax_classification_note:
          type: string
          nullable: true
        primary_color:
          type: string
          nullable: true
        secondary_color:
          type: string
          nullable: true
        accent_color:
          type: string
          nullable: true
      required:
        - legal_name
        - display_name
        - short_code

    UpdateEntityBody:
      type: object
      properties:
        display_name:
          type: string
        purpose:
          type: string
          nullable: true
        primary_color:
          type: string
          nullable: true
        secondary_color:
          type: string
          nullable: true
        accent_color:
          type: string
          nullable: true
        logo_path:
          type: string
          nullable: true
        tax_classification_note:
          type: string
          nullable: true

    EntityClosureAssessment:
      type: object
      properties:
        company_id:
          type: string
          format: uuid
        can_close:
          type: boolean
        warnings:
          type: array
          items:
            type: string
        nonzero_accounts:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
                format: uuid
              name:
                type: string
              balance:
                type: number
            required: [id, name, balance]
        open_intercompany_count:
          type: integer
        open_reimbursement_count:
          type: integer
        unreconciled_line_count:
          type: integer
        evidence_issue_count:
          type: integer
      required:
        - company_id
        - can_close
        - warnings
        - nonzero_accounts
        - open_intercompany_count
        - open_reimbursement_count
        - unreconciled_line_count
        - evidence_issue_count

    Account:
      type: object
      properties:
        id:
          type: string
          format: uuid
        entity_id:
          type: string
          format: uuid
          nullable: true
        name:
          type: string
        account_type:
          type: string
        institution_name:
          type: string
          nullable: true
        last_four:
          type: string
          nullable: true
        opening_balance:
          type: number
        current_balance:
          type: number
        is_tax_reserve:
          type: boolean
        is_active:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
      required:
        - id
        - name
        - account_type
        - opening_balance
        - current_balance
        - is_tax_reserve
        - is_active
        - created_at
        - updated_at

    CreateAccountBody:
      type: object
      properties:
        entity_id:
          type: string
          format: uuid
        name:
          type: string
        account_type:
          type: string
          enum: [checking, savings, credit_card, cash, loan, other]
        institution_name:
          type: string
          nullable: true
        last_four:
          type: string
          pattern: "^[0-9]{4}$"
          nullable: true
        opening_balance:
          type: number
        is_tax_reserve:
          type: boolean
      required: [entity_id, name, account_type]

    UpdateAccountBody:
      type: object
      properties:
        name:
          type: string
        account_type:
          type: string
          enum: [checking, savings, credit_card, cash, loan, other]
        institution_name:
          type: string
          nullable: true
        last_four:
          type: string
          pattern: "^[0-9]{4}$"
          nullable: true
        is_tax_reserve:
          type: boolean
        is_active:
          type: boolean

    Category:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        category_type:
          type: string
        description:
          type: string
          nullable: true
        is_active:
          type: boolean
      required:
        - id
        - name
        - category_type
        - is_active

    CreateCategoryBody:
      type: object
      properties:
        name:
          type: string
        category_type:
          type: string
          enum: [expense, income, asset, liability, equity, other]
        description:
          type: string
          nullable: true
      required: [name, category_type]

    UpdateCategoryBody:
      type: object
      properties:
        name:
          type: string
        category_type:
          type: string
          enum: [expense, income, asset, liability, equity, other]
        description:
          type: string
          nullable: true
        is_active:
          type: boolean

    Vendor:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        default_category_id:
          type: string
          format: uuid
          nullable: true
        notes:
          type: string
          nullable: true
        is_active:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
      required:
        - id
        - name
        - is_active
        - created_at
        - updated_at

    CreateVendorBody:
      type: object
      properties:
        name:
          type: string
        default_category_id:
          type: string
          format: uuid
          nullable: true
        notes:
          type: string
          nullable: true
      required:
        - name

    UpdateVendorBody:
      type: object
      properties:
        name:
          type: string
        default_category_id:
          type: string
          format: uuid
          nullable: true
        notes:
          type: string
          nullable: true
        is_active:
          type: boolean

    Transaction:
      type: object
      properties:
        id:
          type: string
          format: uuid
        transaction_date:
          type: string
          format: date
        transaction_type:
          type: string
          enum:
            - owner_contribution
            - owner_reimbursement
            - business_expense
            - shared_expense_allocation
            - intercompany_reimbursement
            - owner_draw
            - transfer
            - asset_purchase
            - revenue
            - adjustment
        description:
          type: string
        vendor_id:
          type: string
          format: uuid
          nullable: true
        vendor_name:
          type: string
          nullable: true
        total_amount:
          type: number
        status:
          type: string
          enum:
            - draft
            - posted
            - needs_review
            - voided
        business_purpose:
          type: string
          nullable: true
        is_balanced:
          type: boolean
        allocation_count:
          type: integer
        line_count:
          type: integer
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
      required:
        - id
        - transaction_date
        - transaction_type
        - description
        - total_amount
        - status
        - is_balanced
        - allocation_count
        - line_count
        - created_at
        - updated_at

    TransactionLine:
      type: object
      properties:
        id:
          type: string
          format: uuid
        transaction_id:
          type: string
          format: uuid
        entity_id:
          type: string
          format: uuid
          nullable: true
        entity_short_code:
          type: string
          nullable: true
        account_id:
          type: string
          format: uuid
          nullable: true
