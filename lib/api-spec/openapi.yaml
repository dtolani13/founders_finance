        - period_month

    UpdateMonthlyClosePeriodBody:
      type: object
      properties:
        status:
          type: string
          enum:
            - open
            - review
            - closed
            - reopened
        all_statements_uploaded:
          type: boolean
          nullable: true
        all_transactions_reconciled:
          type: boolean
          nullable: true
        all_receipts_attached:
          type: boolean
          nullable: true
        all_allocations_complete:
          type: boolean
          nullable: true
        intercompany_reviewed:
          type: boolean
          nullable: true
        tax_reserve_reviewed:
          type: boolean
          nullable: true
        export_generated:
          type: boolean
          nullable: true
        correction_memo:
          type: string
          nullable: true

    ExportResult:
      type: object
      properties:
        export_type:
          type: string
        period_month:
          type: string
          format: date
          nullable: true
        entity_id:
          type: string
          format: uuid
          nullable: true
        record_count:
          type: integer
        records:
          type: array
          items:
            type: object
            additionalProperties: true
        generated_at:
          type: string
          format: date-time
      required:
        - export_type
        - record_count
        - records
        - generated_at

    BackupMetadata:
      type: object
      properties:
        id:
          type: string
        app:
          type: string
          const: Founders Finance
        file_name:
          type: string
        created_at:
          type: string
          format: date-time
        completed_at:
          type: string
          format: date-time
          nullable: true
        bytes:
          type: integer
        status:
          type: string
          enum: [complete, failed]
        verification_status:
          type: string
          enum: [not_verified, verified, failed]
        last_verified_at:
          type: string
          format: date-time
          nullable: true
        last_recovery_drill_at:
          type: string
          format: date-time
          nullable: true
        recovery_drill_status:
          type: string
          enum: [not_verified, verified, failed]
        includes_evidence:
          type: boolean
        evidence_file_count:
          type: integer
        database_table_count:
          type: integer
        destination:
          type: string
        error:
          type: string
          nullable: true
      required:
        - id
        - app
        - file_name
        - created_at
        - completed_at
        - bytes
        - status
        - verification_status
        - last_verified_at
        - last_recovery_drill_at
        - recovery_drill_status
        - includes_evidence
        - evidence_file_count
        - database_table_count
        - destination
        - error

    BackupOperation:
      type: object
      properties:
        type:
          type: string
          enum: [create, verify, recovery_drill, restore]
        started_at:
          type: string
          format: date-time
      required:
        - type
        - started_at

    BackupOverview:
      type: object
      properties:
        storage_destination:
          type: string
        evidence_source:
          type: string
        encryption:
          type: string
        active_operation:
          oneOf:
            - $ref: "#/components/schemas/BackupOperation"
            - type: "null"
        latest_successful_at:
          type: string
          format: date-time
          nullable: true
        latest_verified_at:
          type: string
          format: date-time
          nullable: true
        backups:
          type: array
          items:
            $ref: "#/components/schemas/BackupMetadata"
      required:
        - storage_destination
        - evidence_source
        - encryption
        - active_operation
        - latest_successful_at
        - latest_verified_at
        - backups

    BackupPassphraseBody:
      type: object
      properties:
        passphrase:
          type: string
          minLength: 12
          maxLength: 128
      required:
        - passphrase

    CreateBackupBody:
      allOf:
        - $ref: "#/components/schemas/BackupPassphraseBody"
        - type: object
          properties:
            passphrase_confirmation:
              type: string
              minLength: 12
              maxLength: 128
          required:
            - passphrase_confirmation

    RestoreBackupBody:
      allOf:
        - $ref: "#/components/schemas/BackupPassphraseBody"
        - type: object
          properties:
            confirmation:
              type: string
              const: RESTORE FOUNDERS FINANCE
          required:
            - confirmation

    BackupVerificationResult:
      type: object
      properties:
        valid:
          type: boolean
          const: true
        backup_id:
          type: string
        verified_at:
          type: string
          format: date-time
        database_table_count:
          type: integer
        evidence_file_count:
          type: integer
        manifest:
          type: object
          additionalProperties: true
      required:
        - valid
        - backup_id
        - verified_at
        - database_table_count
        - evidence_file_count
        - manifest

    RecoveryDrillResult:
      type: object
      properties:
        valid:
          type: boolean
          const: true
        backup_id:
          type: string
        verified_at:
          type: string
          format: date-time
        restored_database:
          type: string
        table_counts_match:
          type: boolean
          const: true
      required:
        - valid
        - backup_id
        - verified_at
        - restored_database
        - table_counts_match

    RestoreBackupResult:
      type: object
      properties:
        restored:
          type: boolean
          const: true
        backup_id:
          type: string
        pre_restore_backup_id:
          type: string
      required:
        - restored
        - backup_id
        - pre_restore_backup_id
